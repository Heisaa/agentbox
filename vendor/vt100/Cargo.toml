# Vendored copy of vt100 0.16.2 (https://github.com/doy/vt100-rust, MIT).
# Local patch: lines scrolled off a top-anchored scroll region are pushed to
# scrollback (see src/grid.rs), so inline TUIs that insert history via scroll
# regions (e.g. codex --no-alt-screen) keep their transcript scrollable.
# Wired in through [patch.crates-io] in the root Cargo.toml.

[workspace]

[package]
edition = "2021"
rust-version = "1.70"
name = "vt100"
version = "0.16.2"
authors = ["Jesse Luehrs <doy@tozt.net>"]
build = false
include = [
    "src/**/*",
    "LICENSE",
    "README.md",
    "CHANGELOG.md",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Library for parsing terminal data"
homepage = "https://github.com/doy/vt100-rust"
readme = "README.md"
keywords = [
    "terminal",
    "vt100",
]
categories = [
    "command-line-interface",
    "encoding",
]
license = "MIT"
repository = "https://github.com/doy/vt100-rust"

[lib]
name = "vt100"
path = "src/lib.rs"

[dependencies.itoa]
version = "1.0.15"

[dependencies.unicode-width]
version = "0.2.1"

[dependencies.vte]
version = "0.15.0"






